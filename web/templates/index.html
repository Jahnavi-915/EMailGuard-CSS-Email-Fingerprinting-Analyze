<!DOCTYPE html>
<html>
<head>
    <title>EmailGuard Analyzer</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
            height: 100vh;
        }

        .card-custom {
            border-radius: 15px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg p-4 card-custom text-center">

                <h2 class="mb-3">🛡 EmailGuard Analyzer</h2>
                <p class="text-muted">Analyze emails for CSS-based fingerprinting attacks</p>

                <form action="/" method="post" enctype="multipart/form-data">
                    <input class="form-control mb-3" type="file" name="file" accept=".eml" required>
                    <button class="btn btn-primary w-100">Analyze Email</button>
                </form>

                <hr>

                <small class="text-muted">
                    Supports research PoCs, synthetic, and real-world emails
                </small>

            </div>

        </div>
    </div>
</div>

</body>
</html>
