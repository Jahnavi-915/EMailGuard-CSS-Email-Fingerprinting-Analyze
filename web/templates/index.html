<!DOCTYPE html>
<html>
<head>
    <title>Email Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        .box {
            border: 1px solid #ccc;
            padding: 30px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input[type="file"] {
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>📧 Upload Email (.eml)</h2>

    <form action="/" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".eml" required>
        <br>
        <button type="submit">Analyze Email</button>
    </form>
</div>

</body>
</html>
